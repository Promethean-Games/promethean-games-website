    aspect_ratio: "16:9"
  - path: "artifacts/promethean-games/public/images/placeholder-1.png"
    description: "Abstract cinematic tabletop game pieces, dramatic lighting, macro photography, dark moody background"
    aspect_ratio: "16:9"
  - path: "artifacts/promethean-games/public/images/placeholder-2.png"
