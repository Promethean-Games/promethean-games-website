name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      base_path: ${{ steps.base_path.outputs.base_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Show tool versions
        run: |
          node --version
          pnpm --version

      - name: Compute BASE_PATH for Vite
        id: base_path
        shell: bash
        run: |
          BASE_PATH="/"

          echo "Using BASE_PATH=$BASE_PATH"
          echo "base_path=$BASE_PATH" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Clean old build artifacts
        run: rm -rf artifacts/promethean-games/dist

      - name: Build static site
        env:
          PORT: 4173
          BASE_PATH: ${{ steps.base_path.outputs.base_path }}
        run: pnpm --filter @workspace/promethean-games run build


      - name: Verify prerender output
        shell: bash
        run: |
          test -f artifacts/promethean-games/dist/public/index.html
          test -f artifacts/promethean-games/dist/public/about/index.html
          test -f artifacts/promethean-games/dist/public/games/index.html
          test -f artifacts/promethean-games/dist/public/games/par-for-the-course/index.html
          test -f artifacts/promethean-games/dist/public/faq/index.html
          ls -la artifacts/promethean-games/dist/public
          echo "--- Built asset refs (index.html) ---"
          grep -oE 'href="[^"]+"|src="[^"]+"' artifacts/promethean-games/dist/public/index.html | head -n 40

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/promethean-games/dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

